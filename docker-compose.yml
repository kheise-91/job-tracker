services:
  ats:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ats
    restart: unless-stopped
    ports:
      - 5000:80
    volumes:
      - ./data/${APP_USER}:/var/www/html/data/${APP_USER}:rw
    environment:
      - APP_USER=${APP_USER}
      - TZ=America/Chicago